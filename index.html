
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLO CASTANHAL T3 - Gestão CBMPA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bombeiro-vermelho: #ce2029;
            --bombeiro-dourado: #f1c40f;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Urbanist', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* NAVEGAÇÃO RESPONSIVA */
        nav {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 20px;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }
        @media (min-width: 768px) { nav { flex-direction: row; justify-content: space-between; padding: 15px 40px; } }

        .logo { font-weight: 700; font-size: 18px; color: var(--bombeiro-vermelho); letter-spacing: 1px; margin-bottom: 10px; }
        @media (min-width: 768px) { .logo { margin-bottom: 0; font-size: 20px; } }

        .nav-links { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .nav-links a {
            color: var(--text-dim);
            cursor: pointer; font-weight: 500; text-decoration: none;
            transition: 0.3s; font-size: 14px;
        }
        .nav-links a.active, .nav-links a:hover { color: var(--bombeiro-dourado); }

        .slide-container {
            display: none; min-height: 100vh;
            padding: 140px 20px 40px;
            max-width: 1200px; margin: 0 auto; width: 100%;
            animation: fadeIn 0.4s ease-in-out;
        }
        .slide-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--card-dark);
            border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        /* ALERTAS DE ERRO / SUCESSO */
        .alert-message {
            padding: 12px; border-radius: 8px; margin-bottom: 20px;
            font-size: 14px; display: none; text-align: center;
            font-weight: 600;
        }
        .alert-error { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid #ef4444; }
        .alert-success { background: rgba(34, 197, 94, 0.2); color: #86efac; border: 1px solid #22c55e; }

        /* TABELAS */
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { text-align: left; color: var(--bombeiro-dourado); padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        input, button { width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; border: none; }
        input { background: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        button { background: var(--bombeiro-vermelho); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }

        .admin-only { display: none; }

        .checklist-item {
            background: rgba(255,255,255,0.03); margin-bottom: 8px;
            padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px;
        }
        .category-title {
            color: var(--bombeiro-dourado); margin: 25px 0 10px;
            border-left: 4px solid var(--bombeiro-vermelho); padding-left: 12px;
            font-weight: 700; text-transform: uppercase;
        }

        .timer-card {
            background: linear-gradient(135deg, var(--bombeiro-vermelho), #8b0000);
            border-radius: 24px; padding: 30px; text-align: center;
        }
        .timer-value { font-size: 60px; font-weight: 700; display: block; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-fire"></i> CASTANHAL T3</div>
        <div class="nav-links">
            <a onclick="showSlide('home')" id="link-home" class="active">Início</a>
            <a onclick="showSlide('lista')" id="link-lista">Lista T3</a>
            <a onclick="showSlide('checklist')" id="link-checklist">Enxoval</a>
            <a onclick="showSlide('admin')" id="link-admin" class="admin-only">Painel ADM</a>
        </div>
    </nav>

    <div id="slide-home" class="slide-container active">
        <div class="card">
            <h1>CFP Castanhal <span style="color:var(--bombeiro-vermelho)">2026</span></h1>
            <p>Sistema oficial de gestão do enxoval e antiguidade.</p>
            <div class="timer-card">
                <span class="timer-value" id="days-timer">000</span>
                <span>DIAS PARA O CFP</span>
            </div>
        </div>
    </div>

    <div id="slide-lista" class="slide-container">
        <div class="card">
            <h2>Lista de Efetivo</h2>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>Nº</th><th>Nome</th><th>Posição</th><th class="admin-only">Ações</th></tr></thead>
                    <tbody id="alunoTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="slide-checklist" class="slide-container">
        <div id="auth-area" style="max-width: 450px; margin: 0 auto;">
            <div class="card">
                <h3 style="text-align:center">Acesso do Aluno</h3>
                <div id="auth-alert" class="alert-message"></div>
                <input type="email" id="userEmail" placeholder="E-mail">
                <input type="password" id="userPass" placeholder="Senha (min. 6 caracteres)">
                <button onclick="handleAuth('login')">Entrar</button>
                <button onclick="handleAuth('signup')" style="background: #475569; margin-top:10px">Criar Conta</button>
            </div>
        </div>
        <div id="checklist-area" style="display: none;">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Meu Enxoval</h2>
                    <button onclick="logout()" style="width:auto; padding: 8px 15px; background: #334155;">Sair</button>
                </div>
                <div id="items-list"></div>
            </div>
        </div>
    </div>

    <div id="slide-admin" class="slide-container">
        <div class="card">
            <h2><i class="fa-solid fa-lock"></i> Painel Administrativo</h2>
            <p>Apenas acesso autorizado.</p>
            <input type="text" id="admNome" placeholder="Nome do Aluno">
            <input type="number" id="admPos" placeholder="Posição Geral">
            <button onclick="adicionarAluno()">Adicionar Aluno</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDym9reAAHi0v9CpxXhHo4FoWAv6etmsXU",
            authDomain: "cbmt3castanhal.firebaseapp.com",
            projectId: "cbmt3castanhal",
            storageBucket: "cbmt3castanhal.firebasestorage.app",
            messagingSenderId: "923532708352",
            appId: "1:923532708352:web:897d4f2f7208460290a6e5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "caiodevanalista@gmail.com";

        const enxoval = {
            "Adaptação": ["Calça jeans azul escura", "Camisa branca", "Tênis preto", "Meia branca"],
            "Educação Física": ["Camisa dry fit branca", "Short vermelho", "Sunga preta"],
            "Kits": ["Kit Higiene", "Cabo da vida 12mm", "Cantil 1L", "Lanterna"]
        };

        window.showSlide = (id) => {
            document.querySelectorAll('.slide-container').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById('slide-' + id).classList.add('active');
            document.getElementById('link-' + id).classList.add('active');
        };

        const showAlert = (msg, type) => {
            const el = document.getElementById('auth-alert');
            el.innerText = msg;
            el.className = `alert-message ${type === 'error' ? 'alert-error' : 'alert-success'}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        };

        window.handleAuth = async (type) => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;

            if(!email || !pass) return showAlert("Preencha todos os campos.", "error");
            if(pass.length < 6) return showAlert("A senha deve ter pelo menos 6 caracteres.", "error");

            try {
                if(type === 'signup') {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    showAlert("Conta criada com sucesso!", "success");
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) {
                let m = "Erro de autenticação.";
                if(err.code === 'auth/email-already-in-use') m = "Este e-mail já está em uso.";
                if(err.code === 'auth/invalid-credential') m = "E-mail ou senha incorretos.";
                showAlert(m, "error");
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            const isAdmin = user && user.email === ADMIN_EMAIL;
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'table-cell' : 'none');
            document.getElementById('link-admin').style.display = isAdmin ? 'block' : 'none';
            
            if(user) {
                document.getElementById('auth-area').style.display = 'none';
                document.getElementById('checklist-area').style.display = 'block';
                loadChecklist(user.uid);
            } else {
                document.getElementById('auth-area').style.display = 'block';
                document.getElementById('checklist-area').style.display = 'none';
            }
        });

        // LISTA E ADMIN
        onSnapshot(query(collection(db, "alunos_lista"), orderBy("posicao", "asc")), snap => {
            const body = document.getElementById('alunoTableBody');
            body.innerHTML = "";
            let i = 1;
            snap.forEach(d => {
                const a = d.data();
                const isAdmin = auth.currentUser?.email === ADMIN_EMAIL;
                body.innerHTML += `<tr>
                    <td>${i}º</td>
                    <td>${a.nome}</td>
                    <td>${a.posicao}º</td>
                    <td class="admin-only" style="display:${isAdmin?'table-cell':'none'}">
                        <button onclick="removerAluno('${d.id}')" style="background:#ef4444; padding:5px 10px; width:auto">X</button>
                    </td>
                </tr>`;
                i++;
            });
        });

        window.adicionarAluno = async () => {
            const n = document.getElementById('admNome').value;
            const p = parseInt(document.getElementById('admPos').value);
            if(n && p) {
                await addDoc(collection(db, "alunos_lista"), { nome: n, posicao: p });
                document.getElementById('admNome').value = ""; document.getElementById('admPos').value = "";
            }
        };

        window.removerAluno = async (id) => { if(confirm("Excluir?")) await deleteDoc(doc(db, "alunos_lista", id)); };

        async function loadChecklist(uid) {
            const div = document.getElementById('items-list');
            const snap = await getDoc(doc(db, "checklists", uid));
            const data = snap.exists() ? snap.data() : {};
            div.innerHTML = "";
            for (const [cat, itens] of Object.entries(enxoval)) {
                div.innerHTML += `<div class="category-title">${cat}</div>`;
                itens.forEach(i => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'checklist-item';
                    itemDiv.innerHTML = `<input type="checkbox" style="width:20px; height:20px; margin:0" ${data[i] ? 'checked' : ''} onchange="saveItem('${uid}','${i}',this.checked)"><span>${i}</span>`;
                    div.appendChild(itemDiv);
                });
            }
        }

        window.saveItem = async (uid, i, s) => { await setDoc(doc(db, "checklists", uid), { [i]: s }, { merge: true }); };

        setInterval(() => {
            const diff = new Date("July 01, 2026").getTime() - new Date().getTime();
            document.getElementById('days-timer').innerText = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24))).toString().padStart(3, '0');
        }, 1000);
    </script>
</body>
</html>
