
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polo Castanhal T3 - CFP Bombeiros</title>
    <style>
        :root {
            --bombeiro-vermelho: #ce2029;
            --bombeiro-dourado: #f1c40f;
            --dark: #1a1a1a;
            --light: #f4f4f4;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 0;
            color: var(--dark);
        }

        header {
            background: linear-gradient(135deg, var(--bombeiro-vermelho) 0%, #8b0000 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 15px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        #auth-section {
            background: #fff3f3;
            border: 2px dashed var(--bombeiro-vermelho);
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th { background: var(--dark); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background: var(--bombeiro-vermelho);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { opacity: 0.9; }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f9f9f9;
        }

        .pos-tag {
            background: var(--bombeiro-dourado);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85em;
        }

        .hidden { display: none; }

        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>🔥 POLO CASTANHAL T3 🔥</h1>
    <p>Checklist Individual de Formação - CBM</p>
    <div id="timer">Faltam -- dias para o CFP</div>
</header>

<div class="container">
    <!-- COLUNA PRINCIPAL -->
    <div class="main">
        <div class="card">
            <h3>Lista de Alunos (T3)</h3>
            <input type="text" id="search" placeholder="🔍 Buscar colega...">
            <table>
                <thead>
                    <tr><th>#</th><th>Nome</th><th>Posição</th></tr>
                </thead>
                <tbody id="alunoTable"></tbody>
            </table>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <!-- LOGIN SECTION -->
        <div class="card" id="auth-ui">
            <h3>Acesso Restrito</h3>
            <p style="font-size: 0.85em;">Entre com seu e-mail para ver seu checklist individual.</p>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Senha">
            <div style="display:flex; gap:5px;">
                <button onclick="handleAuth('login')" style="flex:1">Entrar</button>
                <button onclick="handleAuth('signup')" style="background:#555; flex:1">Criar Conta</button>
            </div>
        </div>

        <!-- CHECKLIST SECTION (HIDDEN UNTIL LOGIN) -->
        <div class="card hidden" id="user-panel">
            <div class="user-info">
                <strong id="display-email">...</strong>
                <button onclick="logout()" style="padding:4px 8px; font-size:0.7em; background:#333;">Sair</button>
            </div>
            <h3>Meu Enxoval</h3>
            <div id="checklist-container">
                <!-- Itens injetados via JS -->
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // CONFIGURAÇÃO DO SEU FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyDym9reAAHi0v9CpxXhHo4FoWAv6etmsXU",
      authDomain: "cbmt3castanhal.firebaseapp.com",
      projectId: "cbmt3castanhal",
      storageBucket: "cbmt3castanhal.firebasestorage.app",
      messagingSenderId: "923532708352",
      appId: "1:923532708352:web:897d4f2f7208460290a6e5",
      measurementId: "G-T3K5S92DSH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const alunos = [
        "Rebeca Noronha - 1272", "Kaylane Reis - 1304", "Gabriel Barros - 1309", "Ângelo Frederico - 1324",
        "Adryel Rodrigues - 1335", "Karen Neves - 1340", "Flávio Ytallo - 1345", "Matheus Garcia - 1360",
        "Joao Eduardo - 1377", "Maria Larissa - 1381", "Fernanda Martins - 1383", "Carlos Eduardo - 1419",
        "Lanna Melissa - 1425", "Gabriel Peterson - 1431", "Teocelano Machado - 1434", "Natan Matheus - 1467",
        "Rayla Michelle - 1510", "Vinícius Fonseca - 1528", "Eshiley Naiana - 1532", "Esdras Calandrine - 1539",
        "Laila Vieira - 1549", "Ygor Adriano Pereira Correa - 1581", "Antônio Frank Barros Araújo - 1588",
        "Caio Lira - 1592", "Francisco Luan - 1593", "Andressa Monteiro - 1612", "Clara Paiva - 1648",
        "Rafael Felipe - 1651", "Ian M L Saraiva - 1666", "Thayane Prestes - 1667", "Rodrigo Monteiro - 1673",
        "Júlio César - 1687", "Carlos Eduardo Alves de Sousa - 1691", "Poliana Barros - 1699",
        "Tales de Mendonça - 1707", "Renan Baldez - 1710", "Italo Saraiva - 1767", "Eryson Sampaio - 1790",
        "Felipe Fonseca - 1796", "Bernardo Noronha - 1815", "Pedro Amorim - 1820", "Rileyson Monteiro - 1831",
        "Daniel Dias - 1834", "Fabrício Santos - 1846", "Flavio Vinicius - 1884", "Gabriel da Costa Pereira - 1835"
    ];

    const itensEnxoval = [
        "Gandola / Calça Operacional", "Coturno", "Camisetas Brancas", "Gorro Fardado", 
        "Cinto de Guarnição", "Meias Pretas", "Material de Higiene", "Material de Limpeza", 
        "Material de Escritório", "Protetor Solar"
    ];

    // Renderizar Tabela
    const alunoTable = document.getElementById('alunoTable');
    alunos.forEach((entry, i) => {
        const [nome, pos] = entry.split(" - ");
        alunoTable.innerHTML += `<tr><td>${i+1}</td><td><strong>${nome}</strong></td><td><span class="pos-tag">${pos}º</span></td></tr>`;
    });

    // Gerenciar Autenticação
    window.handleAuth = (type) => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if (type === 'signup') {
            createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        } else {
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('user-panel').classList.remove('hidden');
            document.getElementById('display-email').innerText = user.email;
            loadChecklist(user.uid);
        } else {
            document.getElementById('auth-ui').classList.remove('hidden');
            document.getElementById('user-panel').classList.add('hidden');
        }
    });

    // Gerenciar Checklist no Firestore
    async function loadChecklist(uid) {
        const container = document.getElementById('checklist-container');
        container.innerHTML = '';
        
        const docRef = doc(db, "checklists", uid);
        const docSnap = await getDoc(docRef);
        const savedData = docSnap.exists() ? docSnap.data() : {};

        itensEnxoval.forEach(item => {
            const div = document.createElement('div');
            div.className = 'checklist-item';
            const checked = savedData[item] ? 'checked' : '';
            div.innerHTML = `
                <input type="checkbox" ${checked} onchange="updateItem('${uid}', '${item}', this.checked)">
                <label>${item}</label>
            `;
            container.appendChild(div);
        });
    }

    window.updateItem = async (uid, item, status) => {
        const docRef = doc(db, "checklists", uid);
        await setDoc(docRef, { [item]: status }, { merge: true });
    };

    // Timer
    const target = new Date("July 01, 2026 08:00:00").getTime();
    setInterval(() => {
        const diff = target - new Date().getTime();
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('timer').innerText = `Faltam ${days} dias para o início do CFP`;
    }, 1000);

</script>

</body>
</html>
